<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipper — Company Creator</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <script>
      // Sync dark class with system preference (before React hydrates to avoid flash)
      const q = window.matchMedia("(prefers-color-scheme: dark)");
      const saved = localStorage.getItem("theme");
      function apply(dark) { document.documentElement.classList.toggle("dark", dark); }
      if (saved === "dark" || saved === "light") { apply(saved === "dark"); }
      else { apply(q.matches); q.addEventListener("change", (e) => apply(e.matches)); }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
